services:

  app:
    image: ghcr.io/crontinel/app:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: crontinel
      DB_USERNAME: crontinel
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - crontinel

  worker:
    image: ghcr.io/crontinel/app:latest
    restart: unless-stopped
    command: php artisan queue:work redis --queue=crontinel,default --sleep=3 --tries=3 --max-time=3600
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: db
      DB_DATABASE: crontinel
      DB_USERNAME: crontinel
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - crontinel

  scheduler:
    image: ghcr.io/crontinel/app:latest
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    depends_on:
      app:
        condition: service_started
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: db
      DB_DATABASE: crontinel
      DB_USERNAME: crontinel
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - crontinel

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crontinel
      POSTGRES_USER: crontinel
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crontinel"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crontinel

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - crontinel

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_storage:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - crontinel

volumes:
  app_storage:
  db_data:
  redis_data:

networks:
  crontinel:
    driver: bridge
